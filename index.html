<style>
:root {
  --bg: #0B1810; --panel: #12201A; --card: #182A22;
  --border: #264032; --border-hi: #3A6650;
  --text: #E4EDE7; --sub: #88A893; --dim: #567562;
  --green: #34D375; --green-dk: #1B5E3A; --green-bg: rgba(52,211,117,0.07);
  --amber: #F5A623; --sky: #3BB5E8; --red: #EF6B6B; --violet: #A48BFA;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; -webkit-tap-highlight-color:transparent; }
input,select,textarea,button { font-family:inherit; }

.header { background:var(--panel); border-bottom:1px solid var(--border); padding:14px 20px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:100; }
.header img { height:28px; }
.header .sep { width:1px; height:22px; background:var(--border); }
.header .title { font-size:14px; font-weight:700; color:var(--green); letter-spacing:2.5px; }
.header .subtitle { font-size:9px; color:var(--dim); letter-spacing:0.8px; }

.tabs { display:flex; gap:5px; padding:10px 20px; background:var(--bg); border-bottom:1px solid var(--border); position:sticky; top:56px; z-index:99; overflow-x:auto; }
.tab { padding:8px 16px; border-radius:10px; border:1px solid transparent; background:transparent; color:var(--sub); font-size:13px; cursor:pointer; white-space:nowrap; }
.tab.active { background:var(--green-bg); border-color:rgba(52,211,117,0.2); color:var(--green); font-weight:700; }

.content { padding:18px 20px; max-width:960px; margin:0 auto; }

.section { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:16px; }
.section-title { font-size:13px; font-weight:700; color:var(--green); margin-bottom:16px; letter-spacing:0.03em; }

.grid { display:grid; gap:14px; }
.grid-3 { grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); }
.grid-input { grid-template-columns:2fr 1fr auto; align-items:end; }

.field label { display:block; font-size:11px; font-weight:700; color:var(--sub); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; }
.field select, .field input, .field textarea {
  width:100%; padding:11px 14px; background:var(--card); border:1px solid var(--border);
  border-radius:10px; color:var(--text); font-size:14px; outline:none;
}
.field select { cursor:pointer; }
.field textarea { resize:vertical; min-height:80px; }
.field .unit { position:absolute; right:14px; top:50%; transform:translateY(-50%); font-size:12px; color:var(--dim); }
.field .rel { position:relative; }

.btn-add { padding:11px 16px; background:var(--green-dk); color:var(--green); border:1px solid rgba(52,211,117,0.25); border-radius:10px; cursor:pointer; font-size:13px; font-weight:700; height:44px; }
.btn-save { width:100%; padding:15px; background:var(--green-dk); color:var(--green); border:1px solid rgba(52,211,117,0.25); border-radius:12px; cursor:pointer; font-size:15px; font-weight:700; margin-top:4px; }
.btn-save:disabled { background:var(--border); color:var(--dim); cursor:not-allowed; border-color:var(--border); }
.btn-save.saved { background:var(--green); color:var(--bg); border:none; }
.btn-del { padding:6px 14px; background:none; border:1px solid rgba(239,107,107,0.25); border-radius:8px; color:var(--red); font-size:12px; cursor:pointer; font-weight:600; float:right; }
.btn-export { padding:10px 18px; background:var(--card); border:1px solid var(--border); border-radius:10px; color:var(--sub); font-size:12px; cursor:pointer; font-weight:600; }

.badge { display:inline-block; padding:3px 9px; border-radius:6px; font-size:11px; font-weight:600; white-space:nowrap; }
.badge-green { background:rgba(52,211,117,0.08); color:var(--green); border:1px solid rgba(52,211,117,0.2); }
.badge-sky { background:rgba(59,181,232,0.08); color:var(--sky); border:1px solid rgba(59,181,232,0.2); }
.badge-violet { background:rgba(164,139,250,0.08); color:var(--violet); border:1px solid rgba(164,139,250,0.2); }

.stat { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:16px 18px; flex:1 1 140px; min-width:130px; }
.stat .lbl { font-size:11px; color:var(--sub); font-weight:600; text-transform:uppercase; letter-spacing:0.04em; margin-bottom:6px; }
.stat .val { font-size:26px; font-weight:800; }
.stat .unit2 { font-size:13px; color:var(--sub); font-weight:500; margin-left:4px; }

.row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:14px; }

.entry { background:var(--panel); border:1px solid var(--border); border-radius:14px; margin-bottom:10px; overflow:hidden; }
.entry-head { display:flex; align-items:center; gap:10px; padding:13px 18px; cursor:pointer; flex-wrap:wrap; font-size:13px; }
.entry-head .ts { color:var(--dim); font-size:11px; min-width:100px; }
.entry-head .right { margin-left:auto; display:flex; gap:10px; align-items:center; }
.entry-detail { padding:0 18px 16px; border-top:1px solid var(--border); padding-top:16px; }
.detail-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:12px; }
.detail-grid .dlbl { font-size:10px; color:var(--dim); text-transform:uppercase; font-weight:600; margin-bottom:3px; }
.detail-grid .dval { font-size:13px; }
.input-row { display:flex; justify-content:space-between; padding:5px 12px; background:var(--card); border-radius:6px; font-size:13px; margin-bottom:4px; }

.empty { text-align:center; padding:70px 20px; color:var(--sub); }
.empty .icon { font-size:48px; opacity:0.25; margin-bottom:16px; }

@media(max-width:500px) {
  .grid-input { grid-template-columns:1fr; }
  .stat .val { font-size:22px; }
}
</style>
</head>

<script>
// ── IndexedDB Storage ──
const DB_NAME = 'AprilNurseryDB';
const STORE = 'records';
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        d.createObjectStore(STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e);
  });
}

function dbGetAll() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const store = tx.objectStore(STORE);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

function dbPut(record) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const store = tx.objectStore(STORE);
    const req = store.put(record);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function dbDelete(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const store = tx.objectStore(STORE);
    const req = store.delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

// ── Data ──
const SECTORS = ["Greenhouse 1","Greenhouse 2","Greenhouse 3","Greenhouse 4","Hardening Area","Shade House"];
const BENCHES = ["A1","A2","A3","B1","B2","B3","C1","C2","C3"];
const SPECIES = [
  {id:"ACRA_CUTT",label:"ACRA CUTT",desc:"Acacia - Cuttings"},
  {id:"ACRA_TC",label:"ACRA TC",desc:"Acacia - Tissue Culture"},
  {id:"ACRA_SEEDS",label:"ACRA SEEDS",desc:"Acacia - Seeds"},
  {id:"ACRA_APICAL",label:"ACRA APICAL",desc:"Acacia - Apical Rescue"},
  {id:"EUCA_CUTT",label:"EUCA CUTT",desc:"Eucalyptus - Cuttings"},
  {id:"EUCA_TC",label:"EUCA TC",desc:"Eucalyptus - Tissue Culture"},
];
const STAFF = ["Carlos Silva","Maria Oliveira","Jose Santos","Ana Costa","Pedro Lima","Fernanda Souza"];
const INPUTS_LIST = [
  {name:"NPK 10-10-10",unit:"g/L"},{name:"NPK 04-14-08",unit:"g/L"},
  {name:"Osmocote 15-09-12",unit:"g/L"},{name:"Fungicide (Mancozeb)",unit:"mL/L"},
  {name:"Insecticide (Imidacloprid)",unit:"mL/L"},{name:"Growth Regulator (IBA)",unit:"mg/L"},
  {name:"Substrate",unit:"L"},{name:"Vermiculite",unit:"L"},
  {name:"Carbonized Rice Husk",unit:"L"},{name:"Water",unit:"L"},
];

let records = [];
let currentView = 'dashboard';
let formState = {};
let formInputs = [];
let expandedId = null;
let filterSector = '';

function specLabel(id) { const s = SPECIES.find(e=>e.id===id); return s ? s.label : (id||''); }
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function fmtShort(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit'});
}
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function options(arr, ph) {
  let h = '<option value="">'+(ph||'Select...')+'</option>';
  arr.forEach(o => {
    const v = typeof o==='string' ? o : o.value;
    const l = typeof o==='string' ? o : o.label;
    h += '<option value="'+esc(v)+'">'+esc(l)+'</option>';
  });
  return h;
}

// ── Tabs ──
function renderTabs() {
  const tabs = [{id:'dashboard',label:'Dashboard'},{id:'new',label:'New Record'},{id:'history',label:'History'}];
  document.getElementById('tabs').innerHTML = tabs.map(t =>
    '<button class="tab'+(currentView===t.id?' active':'')+'" onclick="switchView(\''+t.id+'\')">'+t.label+'</button>'
  ).join('');
}

function switchView(v) {
  currentView = v;
  if (v==='new') resetForm();
  renderTabs();
  renderContent();
}

// ── Dashboard ──
function renderDashboard() {
  if (!records.length) return '<div class="empty"><div class="icon">🌱</div><div style="font-size:17px;font-weight:600">No records yet</div><div style="font-size:13px;margin-top:8px;color:var(--dim)">Start by adding an environmental log entry</div></div>';

  const temps=records.filter(r=>r.temperature).map(r=>parseFloat(r.temperature));
  const hums=records.filter(r=>r.humidity).map(r=>parseFloat(r.humidity));
  const luxs=records.filter(r=>r.light).map(r=>parseFloat(r.light));
  const today=new Date().toDateString();
  const todayN=records.filter(r=>new Date(r.timestamp).toDateString()===today).length;
  const avg=(a)=>a.length?(a.reduce((s,v)=>s+v,0)/a.length).toFixed(1):'\u2014';
  const matSet=new Set(); records.forEach(r=>{if(r.species||r.geneticMaterial)matSet.add((r.species||'')+'|'+(r.geneticMaterial||''));});

  let h = '<div class="row">';
  h += stat('Avg Temp',avg(temps),'\u00B0C','var(--amber)');
  h += stat('Avg Humidity',avg(hums),'%','var(--sky)');
  h += stat('Avg Light',luxs.length?Math.round(luxs.reduce((s,v)=>s+v,0)/luxs.length):'\u2014','lux','var(--amber)');
  h += stat('Genetic Mat.',matSet.size,'','var(--green)');
  h += '</div><div class="row">';
  h += stat('Total',records.length,'','var(--violet)');
  h += stat('Today',todayN,'','var(--green)');
  h += stat('Max Temp',temps.length?Math.max(...temps):'\u2014','\u00B0C','var(--red)');
  h += stat('Min Temp',temps.length?Math.min(...temps):'\u2014','\u00B0C','var(--sky)');
  h += '</div>';

  // Charts
  h += '<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px">';
  h += '<div class="section" style="flex:2 1 340px;margin-bottom:0"><div class="section-title">Temperature & Humidity — Last 7 Days</div><canvas id="chartTH" height="200"></canvas></div>';
  h += '<div class="section" style="flex:1 1 220px;margin-bottom:0"><div class="section-title">Records by Sector</div><canvas id="chartSector" height="200"></canvas></div>';
  h += '</div>';

  // Latest entries
  h += '<div class="section"><div class="section-title">Latest Entries</div>';
  records.slice(-5).reverse().forEach(r => {
    h += '<div style="display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--card);border-radius:10px;font-size:13px;flex-wrap:wrap;margin-bottom:6px">';
    h += '<span style="color:var(--dim);font-size:11px;min-width:100px">'+fmtDate(r.timestamp)+'</span>';
    h += '<span class="badge badge-green">'+esc(r.sector)+'</span>';
    h += '<span>'+esc(r.employee)+'</span>';
    if(r.species) h+='<span class="badge badge-violet">'+esc(specLabel(r.species))+'</span>';
    if(r.temperature) h+='<span style="color:var(--amber)">'+esc(r.temperature)+'\u00B0C</span>';
    if(r.humidity) h+='<span style="color:var(--sky)">'+esc(r.humidity)+'%</span>';
    h += '</div>';
  });
  h += '</div>';

  // Export button
  h += '<div style="text-align:center;margin-top:8px"><button class="btn-export" onclick="exportCSV()">Export CSV</button></div>';

  return h;
}

function stat(label,value,unit,color) {
  return '<div class="stat"><div class="lbl">'+label+'</div><span class="val" style="color:'+color+'">'+value+'</span>'+(unit?'<span class="unit2">'+unit+'</span>':'')+'</div>';
}

// ── Form ──
function resetForm() {
  formState = {employee:'',sector:'',bench:'',species:'',geneticMaterial:'',temperature:'',humidity:'',light:'',shadeNet:'',notes:''};
  formInputs = [];
}
resetForm();

function renderForm() {
  let h = '';
  // Identification
  h += '<div class="section"><div class="section-title">Identification</div><div class="grid grid-3">';
  h += field('Employee','employee','select',STAFF);
  h += field('Sector','sector','select',SECTORS);
  h += field('Bench / Lot','bench','select',BENCHES);
  h += '</div></div>';

  // Genetic Material
  h += '<div class="section"><div class="section-title">Genetic Material</div><div class="grid grid-3">';
  h += field('Species / Propagation','species','select',SPECIES.map(s=>({value:s.id,label:s.label+' \u2014 '+s.desc})),'Select species...');
  h += '<div class="field"><label>Clone / Lot / ID</label><input id="f_geneticMaterial" value="'+esc(formState.geneticMaterial||'')+'" placeholder="'+(formState.species?'e.g. GG100, I-224...':'Select species first')+'" onchange="formState.geneticMaterial=this.value"></div>';
  h += '</div>';
  if (formState.species) {
    h += '<div style="margin-top:10px;padding:7px 14px;background:var(--green-bg);border-radius:8px;font-size:12px;color:var(--green);display:inline-block;font-weight:600">'+esc(specLabel(formState.species))+(formState.geneticMaterial?' \u2014 '+esc(formState.geneticMaterial):'')+'</div>';
  }
  h += '</div>';

  // Environmental Variables
  h += '<div class="section"><div class="section-title">Environmental Variables</div><div class="grid grid-3">';
  h += fieldInput('Temperature','temperature','number','e.g. 28.5','\u00B0C','0.1');
  h += fieldInput('Relative Humidity','humidity','number','e.g. 75','%','0.1');
  h += fieldInput('Light Intensity','light','number','e.g. 15000','lux','1');
  h += field('Shade-net','shadeNet','select',['Extended','Retracted']);
  h += '</div></div>';

  // Inputs
  h += '<div class="section"><div class="section-title">Inputs Used</div>';
  h += '<div class="grid grid-input">';
  h += '<div class="field"><label>Input</label><select id="curInputName">'+options(INPUTS_LIST.map(i=>({value:i.name,label:i.name+' ('+i.unit+')'})))+'</select></div>';
  h += '<div class="field"><label>Qty</label><input id="curInputQty" type="number" step="0.1" placeholder="0"></div>';
  h += '<button class="btn-add" onclick="addInput()">+ Add</button>';
  h += '</div>';
  if (formInputs.length) {
    h += '<div style="margin-top:12px">';
    formInputs.forEach((inp,i) => {
      h += '<div class="input-row"><span>'+esc(inp.name)+'</span><span><span style="color:var(--green);font-weight:600">'+esc(inp.qty)+' '+esc(inp.unit)+'</span> <button onclick="removeInput('+i+')" style="background:none;border:none;color:var(--red);cursor:pointer;font-weight:700;font-size:14px;padding:0 4px">x</button></span></div>';
    });
    h += '</div>';
  }
  h += '</div>';

  // Notes
  h += '<div class="section"><div class="section-title">Notes</div>';
  h += '<div class="field"><textarea id="f_notes" placeholder="Visual conditions, issues detected..." onchange="formState.notes=this.value">'+esc(formState.notes||'')+'</textarea></div></div>';

  // Save
  const disabled = !formState.employee || !formState.sector;
  h += '<button class="btn-save" id="saveBtn" '+(disabled?'disabled':'')+' onclick="saveRecord()">Save Record</button>';

  return h;
}

function field(label,key,type,opts,ph) {
  let h = '<div class="field"><label>'+label+'</label>';
  if (type==='select') {
    h += '<select onchange="formState.'+key+'=this.value;renderContent()">'+options(opts,ph);
    h += '</select>';
    // set selected
    setTimeout(()=>{const el=document.querySelector('[onchange*=\"formState.'+key+'\"]');if(el)el.value=formState[key]||'';},0);
  }
  h += '</div>';
  return h;
}

function fieldInput(label,key,type,ph,unit,step) {
  let h = '<div class="field"><label>'+label+'</label><div class="rel">';
  h += '<input type="'+type+'" value="'+esc(formState[key]||'')+'" placeholder="'+ph+'" step="'+(step||'')+'" '+(unit?'style="padding-right:50px"':'')+' onchange="formState.'+key+'=this.value">';
  if (unit) h += '<span class="unit">'+unit+'</span>';
  h += '</div></div>';
  return h;
}

function addInput() {
  const nameEl = document.getElementById('curInputName');
  const qtyEl = document.getElementById('curInputQty');
  if (!nameEl.value||!qtyEl.value) return;
  const info = INPUTS_LIST.find(i=>i.name===nameEl.value);
  formInputs.push({name:nameEl.value,qty:qtyEl.value,unit:info?info.unit:''});
  nameEl.value=''; qtyEl.value='';
  renderContent();
}

function removeInput(i) {
  formInputs.splice(i,1);
  renderContent();
}

async function saveRecord() {
  const rec = {
    ...formState,
    inputs: [...formInputs],
    timestamp: new Date().toISOString(),
    id: Date.now().toString()
  };
  await dbPut(rec);
  records.push(rec);
  const btn = document.getElementById('saveBtn');
  btn.className = 'btn-save saved';
  btn.textContent = '\u2713 Record Saved!';
  setTimeout(()=>{ resetForm(); renderContent(); }, 1500);
}

// ── History ──
function renderHistory() {
  let filtered = records.slice().reverse();
  if (filterSector) filtered = filtered.filter(r=>r.sector===filterSector);

  let h = '<div style="display:flex;gap:14px;align-items:end;flex-wrap:wrap;margin-bottom:16px">';
  h += '<div class="field" style="flex:1 1 220px"><label>Filter by Sector</label><select onchange="filterSector=this.value;renderContent()">'+options(SECTORS,'All sectors')+'</select></div>';
  h += '<div style="font-size:13px;color:var(--sub);padding:11px 0">'+filtered.length+' record(s)</div>';
  h += '<button class="btn-export" onclick="exportCSV()">Export CSV</button>';
  h += '</div>';

  // Set filter select value
  setTimeout(()=>{const s=document.querySelector('[onchange*="filterSector"]');if(s)s.value=filterSector;},0);

  if (!filtered.length) return h+'<div class="empty" style="padding:50px"><div style="font-size:14px">No records found</div></div>';

  filtered.forEach(r => {
    const open = expandedId===r.id;
    h += '<div class="entry" style="border-color:'+(open?'var(--border-hi)':'var(--border)')+'">';
    h += '<div class="entry-head" onclick="expandedId=expandedId===\''+r.id+'\'?null:\''+r.id+'\';renderContent()">';
    h += '<span class="ts">'+fmtDate(r.timestamp)+'</span>';
    h += '<span class="badge badge-green">'+esc(r.sector)+'</span>';
    if(r.bench) h+='<span class="badge badge-sky">'+esc(r.bench)+'</span>';
    if(r.species) h+='<span class="badge badge-violet">'+esc(specLabel(r.species))+'</span>';
    h += '<span style="font-weight:500">'+esc(r.employee)+'</span>';
    h += '<span class="right">';
    if(r.temperature) h+='<span style="color:var(--amber);font-size:12px">'+esc(r.temperature)+'\u00B0C</span>';
    if(r.humidity) h+='<span style="color:var(--sky);font-size:12px">'+esc(r.humidity)+'%</span>';
    h += '<span style="color:var(--dim);font-size:11px;display:inline-block;transition:transform 0.15s;transform:rotate('+(open?'180':'0')+'deg)">\u25BC</span>';
    h += '</span></div>';

    if (open) {
      h += '<div class="entry-detail"><div class="detail-grid">';
      if(r.species||r.geneticMaterial){h+='<div><div class="dlbl">Genetic Material</div><div class="dval">'+esc(specLabel(r.species))+(r.species&&r.geneticMaterial?' \u2014 ':'')+esc(r.geneticMaterial||'')+'</div></div>';}
      if(r.temperature){h+='<div><div class="dlbl">Temperature</div><div class="dval" style="color:var(--amber)">'+esc(r.temperature)+' \u00B0C</div></div>';}
      if(r.humidity){h+='<div><div class="dlbl">Humidity</div><div class="dval" style="color:var(--sky)">'+esc(r.humidity)+'%</div></div>';}
      if(r.light){h+='<div><div class="dlbl">Light</div><div class="dval" style="color:var(--amber)">'+esc(r.light)+' lux</div></div>';}
      if(r.shadeNet){h+='<div><div class="dlbl">Shade-net</div><div class="dval">'+esc(r.shadeNet)+'</div></div>';}
      h+='</div>';

      if(r.inputs&&r.inputs.length){
        h+='<div style="margin-bottom:12px"><div class="dlbl" style="margin-bottom:6px">Inputs</div>';
        r.inputs.forEach(inp=>{h+='<div class="input-row"><span>'+esc(inp.name)+'</span><span style="color:var(--green);font-weight:600">'+esc(inp.qty)+' '+esc(inp.unit)+'</span></div>';});
        h+='</div>';
      }
      if(r.notes){h+='<div style="margin-bottom:12px"><div class="dlbl" style="margin-bottom:4px">Notes</div><div style="font-size:13px;line-height:1.6;background:var(--card);padding:10px 14px;border-radius:8px">'+esc(r.notes)+'</div></div>';}
      h+='<button class="btn-del" onclick="deleteRecord(\''+r.id+'\')">Delete</button><div style="clear:both"></div>';
      h+='</div>';
    }
    h += '</div>';
  });

  return h;
}

async function deleteRecord(id) {
  await dbDelete(id);
  records = records.filter(r=>r.id!==id);
  expandedId = null;
  renderContent();
}

function exportCSV() {
  if (!records.length) return alert('No records to export');
  const headers = ['Timestamp','Employee','Sector','Bench','Species','Clone/Lot','Temperature','Humidity','Light','Shade-net','Inputs','Notes'];
  let csv = '\uFEFF' + headers.join(',')+'\n';
  records.forEach(r=>{
    const inputs = (r.inputs||[]).map(i=>i.name+':'+i.qty+i.unit).join('; ');
    const row = [
      r.timestamp||'',
      '"'+(r.employee||'')+'"',
      '"'+(r.sector||'')+'"',
      '"'+(r.bench||'')+'"',
      '"'+specLabel(r.species)+'"',
      '"'+(r.geneticMaterial||'')+'"',
      r.temperature||'',
      r.humidity||'',
      r.light||'',
      '"'+(r.shadeNet||'')+'"',
      '"'+inputs+'"',
      '"'+(r.notes||'').replace(/"/g,'""')+'"'
    ];
    csv += row.join(',')+'\n';
  });
  try {
    const blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'april-nursery-'+new Date().toISOString().slice(0,10)+'.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  } catch(e) {
    // Fallback: open as data URI
    const encoded = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    window.open(encoded, '_blank');
  }
}

// ── Render ──
function renderContent() {
  const el = document.getElementById('content');
  if (currentView==='dashboard') {
    el.innerHTML = renderDashboard();
    if (records.length) buildCharts();
  }
  else if (currentView==='new') el.innerHTML = renderForm();
  else if (currentView==='history') el.innerHTML = renderHistory();
}

function buildCharts() {
  // Last 7 days temp & humidity
  const labels = [];
  const tempData = [];
  const humData = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const ds = d.toDateString();
    labels.push(fmtShort(d.toISOString()));
    const dayR = records.filter(r => new Date(r.timestamp).toDateString() === ds);
    const dT = dayR.filter(r => r.temperature).map(r => parseFloat(r.temperature));
    const dH = dayR.filter(r => r.humidity).map(r => parseFloat(r.humidity));
    tempData.push(dT.length ? (dT.reduce((a,b)=>a+b,0)/dT.length).toFixed(1) : null);
    humData.push(dH.length ? (dH.reduce((a,b)=>a+b,0)/dH.length).toFixed(1) : null);
  }

  const thCanvas = document.getElementById('chartTH');
  if (thCanvas) {
    new Chart(thCanvas, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'Temp (\u00B0C)',
            data: tempData,
            borderColor: '#F5A623',
            backgroundColor: 'rgba(245,166,35,0.1)',
            fill: true,
            tension: 0.3,
            spanGaps: true,
          },
          {
            label: 'Humidity (%)',
            data: humData,
            borderColor: '#3BB5E8',
            backgroundColor: 'rgba(59,181,232,0.1)',
            fill: true,
            tension: 0.3,
            spanGaps: true,
          }
        ]
      },
      options: {
        responsive: true,
        plugins: { legend: { labels: { color: '#88A893', font: { size: 11 } } } },
        scales: {
          x: { ticks: { color: '#567562', font: { size: 11 } }, grid: { color: '#264032' } },
          y: { ticks: { color: '#567562', font: { size: 11 } }, grid: { color: '#264032' } }
        }
      }
    });
  }

  // Records by sector
  const sectorMap = {};
  records.forEach(r => { sectorMap[r.sector] = (sectorMap[r.sector] || 0) + 1; });
  const sectorLabels = Object.keys(sectorMap);
  const sectorValues = Object.values(sectorMap);

  const secCanvas = document.getElementById('chartSector');
  if (secCanvas) {
    new Chart(secCanvas, {
      type: 'bar',
      data: {
        labels: sectorLabels.map(s => s.replace('Greenhouse ','GH')),
        datasets: [{
          label: 'Records',
          data: sectorValues,
          backgroundColor: 'rgba(52,211,117,0.6)',
          borderColor: '#34D375',
          borderWidth: 1,
          borderRadius: 6,
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#567562', font: { size: 11 } }, grid: { color: '#264032' } },
          y: { ticks: { color: '#567562', font: { size: 11 } }, grid: { display: false } }
        }
      }
    });
  }
}

// ── Init ──
async function init() {
  await openDB();
  records = await dbGetAll();
  records.sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
  renderTabs();
  renderContent();
}

init();
</script>
